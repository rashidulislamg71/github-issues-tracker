<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <!-- Tailwind + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="bg-gray-100">
    <!-- header  -->
    <header
      class="flex flex-col md:flex-row justify-between items-center gap-4 py-4 px-5 bg-white shadow"
    >
      <!-- Logo -->
      <div class="flex items-center gap-2">
        <i class="text-4xl fa-brands fa-github"></i>
        <h3 class="font-bold text-xl">GitHub Issues Tracker</h3>
      </div>

      <!-- Search + Button -->
      <div class="flex items-center gap-3 w-full md:w-auto">
        <label class="input w-full md:w-[250px]">
          <svg
            class="h-[1em] opacity-50"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
          >
            <g
              stroke-linejoin="round"
              stroke-linecap="round"
              stroke-width="2.5"
              fill="none"
              stroke="currentColor"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </g>
          </svg>
          <input id="search-input" type="search" placeholder="Search issue..." />
        </label>

        <button id="search-btn" class="btn btn-primary whitespace-nowrap">
          <i class="fa-solid fa-plus"></i>
          <span class="hidden sm:inline">New Issue</span>
        </button>
      </div>
    </header>

    <!-- tabs btn  -->
    <section class="px-4">
      <div
        class="flex flex-wrap gap-3 p-4 sm:p-4 m-auto mt-8 max-w-[1400px] bg-white rounded shadow"
      >
        <button
          data-filter="all"
          class="primaryBtn px-2 py-1 rounded border-1 bg-blue-700 text-white cursor-pointer"
        >
          All
        </button>

        <button
          data-filter="Open"
          class="primaryBtn px-2 py-1 rounded border cursor-pointer"
        >
          Open
        </button>

        <button
          data-filter="Closed"
          class="primaryBtn px-2 py-1 rounded border cursor-pointer"
        >
          Closed
        </button>
      </div>
    </section>

    <!-- issues header  -->
    <section class="pb-5 px-4">
      <div
        class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-5 p-4 m-auto mt-6 max-w-[1400px] bg-white rounded shadow"
      >
        <!-- Left -->
        <div class="flex items-center gap-3">
          <div class="p-2 bg-purple-100 rounded-full">
            <img src="./assets/Aperture.png" alt="Aperture" />
          </div>

          <div>
            <h3 id="issues-counter" class="font-bold text-xl text-black">
              0 Issues
            </h3>
            <p class="text-gray-400">Track and manage your project issues</p>
          </div>
        </div>

        <!-- Right -->
        <div class="flex items-center gap-6">
          <div class="flex items-center gap-2">
            <div class="h-3 w-3 bg-green-500 rounded-full"></div>
            <p>Open</p>
          </div>

          <div class="flex items-center gap-2">
            <div class="h-3 w-3 bg-purple-500 rounded-full"></div>
            <p>Closed</p>
          </div>
        </div>
      </div>
    </section>

    <!-- issues cards  -->
    <section class="px-4 pb-10">
      <div
        id="card-container"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 max-w-[1400px] mx-auto"
      ></div>
    </section>

    <!-- modal  -->
    <section>
      <dialog id="my_modal_1" class="modal">
        <div class="modal-box max-w-xl">
          <div id="modal-container"></div>

          <div class="modal-action">
            <form method="dialog">
              <button
                class="bg-blue-700 text-white px-4 py-2 rounded cursor-pointer"
              >
                Close
              </button>
            </form>
          </div>
        </div>
      </dialog>
    </section>

    <!-- loader  -->
    <div id="loader" class="flex justify-center items-center hidden py-28">
      <span class="loading loading-spinner text-primary"></span>
    </div>

    <!-- error  -->
    <div class="py-2 text-center" id="error"></div>

    <script src="script.js"></script>
  </body>
</html>
