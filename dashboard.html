<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- tailwindCSS and daisyui cdn  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- header section  -->
    <header
      id="header"
      class="flex justify-between items-center flex-wrap gap-2 py-4 px-5 bg-white"
    >
      <!-- logo  -->
      <div class="flex items-center gap-1">
        <i class="text-4xl fa-brands fa-github"></i>
        <h3 class="font-bold text-xl">GitHub Issues Tracker</h3>
      </div>
      <!-- search  -->
      <div class="flex items-center gap-3">
        <label class="input w-[270px]">
          <svg
            class="h-[1em] opacity-50"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
          >
            <g
              stroke-linejoin="round"
              stroke-linecap="round"
              stroke-width="2.5"
              fill="none"
              stroke="currentColor"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </g>
          </svg>
          <input type="search" required placeholder="Search" />
        </label>
        <button class="btn btn-primary">
          <i class="fa-solid fa-plus"></i> <span>New Issue</span>
        </button>
      </div>
    </header>

    <!-- button section  -->
    <section class="">
      <div
        class="flex gap-5 p-6 m-auto mt-10 lg:mt-15 max-w-[1100px] bg-white rounded"
      >
        <button
          class="primaryBtn px-4 py-2 rounded bg-blue-700 text-white border-1 cursor-pointer"
        >
          All
        </button>
        <button class="primaryBtn px-4 py-2 rounded border-1 cursor-pointer">
          Open
        </button>
        <button class="primaryBtn px-4 py-2 rounded border-1 cursor-pointer">
          Closed
        </button>
      </div>
    </section>

    <section class="pb-5">
      <div
        class="flex justify-between items-center gap-5 p-6 m-auto mt-6 max-w-[1100px] bg-white rounded border-b-gray-400"
      >
        <div>
          <div class="flex items-center gap-2">
            <div class="p-2 bg-purple-100 rounded-full">
              <img src="./assets/Aperture.png" alt="" />
            </div>
            <div>
              <h3 class="font-bold text-black-600 text-xl">50 Issues</h3>
              <p class="text-gray-400">Track and manage your project issues</p>
            </div>
          </div>
          <div></div>
        </div>

        <div class="flex items-center gap-5">
          <div class="flex items-center gap-1">
            <div class="h-3 w-3 bg-green-500 rounded-full"></div>
            <p>Open</p>
          </div>
          <div class="flex items-center gap-1">
            <div class="h-3 w-3 bg-purple-500 rounded-full"></div>
            <p>Closed</p>
          </div>
        </div>
      </div>
    </section>

    <section></section>

    <script src="script.js"></script>
  </body>
</html>
