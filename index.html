<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <!-- tailwindCSS and daisyui cdn  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8">
      <!-- logo -->
      <div class="text-center">
        <i class="text-8xl fa-brands fa-github"></i>
      </div>

      <h2 class="text-center text-2xl font-semibold text-gray-800">
        GitHub Issues Tracker
      </h2>

      <p class="text-center text-gray-500 text-sm mb-6">
        Sign in to manage your issues
      </p>

      <!-- Username -->
      <label class="text-sm text-gray-600">Username</label>
      <input
        id="username"
        type="text"
        placeholder="Enter Username"
        class="w-full mt-1 mb-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
      />

      <p class="text-xs text-purple-600 mb-4">Default: admin</p>

      <!-- Password -->
      <label class="text-sm text-gray-600">Password</label>
      <input
        id="password"
        type="password"
        placeholder="Enter Password"
        class="w-full mt-1 mb-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
      />

      <p class="text-xs text-purple-600 mb-6">Default: admin123</p>

      <!-- Button -->
      <button
        id="login"
        class="cursor-pointer w-full py-2 rounded-lg text-white font-medium bg-gradient-to-r from-purple-600 to-indigo-600 hover:opacity-90"
      >
        Sign In
      </button>

      <!-- OR -->
      <div class="flex items-center my-6">
        <hr class="flex-grow border-gray-300" />
        <span class="px-3 text-gray-400 text-sm">OR</span>
        <hr class="flex-grow border-gray-300" />
      </div>

      <p class="text-center text-sm text-gray-500 mb-3">Demo Credentials:</p>

      <div class="bg-gray-100 rounded-lg p-4 text-center text-sm">
        <p><span class="font-semibold">Username:</span> admin</p>
        <p><span class="font-semibold">Password:</span> admin123</p>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
